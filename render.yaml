services:
  - type: web
    name: crcs-bergeggi-pos
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npm run db:push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LICENSE_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: crcs-bergeggi-db
          property: connectionString

databases:
  - name: crcs-bergeggi-db
    plan: free
    databaseName: crcs_bergeggi
    user: restaurant_user
